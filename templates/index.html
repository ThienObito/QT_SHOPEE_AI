<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QT_SHOPEE AI</title>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial;
}

.header{
    background:#ee4d2d;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.chat-box{
    background:white;
    border-radius:10px;
    padding:20px;
    height:500px;
    overflow-y:auto;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.user{
    text-align:right;
    margin:10px 0;
}

.bot{
    text-align:left;
    margin:10px 0;
}

.bubble{
    display:inline-block;
    padding:12px;
    border-radius:10px;
    max-width:70%;
}

.user .bubble{
    background:#ee4d2d;
    color:white;
}

.bot .bubble{
    background:#ececec;
}

.input-area{
    display:flex;
    margin-top:20px;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
}

button{
    padding:12px 20px;
    border:none;
    background:#ee4d2d;
    color:white;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
    <h2>QT_SHOPEE AI</h2>
</div>

<div class="container">

```
<div id="chat" class="chat-box"></div>

<div class="input-area">

    <input
        id="message"
        placeholder="Ví dụ: Đơn Shopee 500k nên dùng mã gì?"
    >

    <button onclick="sendMessage()">
        Gửi
    </button>

</div>
```

</div>

<script>

async function sendMessage(){

    const input =
        document.getElementById("message");

    const message =
        input.value.trim();

    if(!message){
        return;
    }

    const chat =
        document.getElementById("chat");

    chat.innerHTML += `
    <div class="user">
        <div class="bubble">${message}</div>
    </div>
    `;

    input.value = "";

    try{

        const response = await fetch("/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:message
            })
        });

        const data = await response.json();

        chat.innerHTML += `
        <div class="bot">
            <div class="bubble">
                ${data.answer}
            </div>
        </div>
        `;

        chat.scrollTop =
            chat.scrollHeight;

    }catch(error){

        chat.innerHTML += `
        <div class="bot">
            <div class="bubble">
                Lỗi kết nối AI
            </div>
        </div>
        `;
    }
}

</script>

</body>
</html>
